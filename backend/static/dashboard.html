<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — ListWorks PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0}
.nav{background:#1a1a2e;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #2a2a4a}
.nav a{padding:16px 20px;color:#888;text-decoration:none;font-size:14px;border-bottom:2px solid transparent}
.nav a:hover{color:#fff}
.nav a.active{color:#fff;border-bottom-color:#d63b1e}
.nav .brand{color:#fff;font-weight:700;font-size:15px;margin-right:24px}
.nav .spacer{flex:1}
.nav .user{color:#888;font-size:12px;padding:8px 12px;cursor:pointer}
.nav .user:hover{color:#fff}
.container{max-width:1000px;margin:0 auto;padding:24px}
.page{display:none}.page.active{display:block}
h1{font-size:22px;color:#fff;margin-bottom:4px}
.sub{color:#888;font-size:13px;margin-bottom:20px}
.card{background:#1a1a2e;border-radius:10px;padding:20px;margin-bottom:14px;border:1px solid #2a2a4a}
.card h2{font-size:16px;color:#fff;margin-bottom:4px}
.card .meta{color:#888;font-size:12px;margin-bottom:10px}
.card p{font-size:13px;color:#aaa;line-height:1.5}
.btn{background:#d63b1e;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#b83218}
.btn-outline{background:transparent;border:1px solid #333;color:#aaa;cursor:pointer;padding:8px 18px;border-radius:6px;font-size:13px}
.btn-outline:hover{border-color:#555;color:#fff}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pack-files{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.file-tag{background:#15152a;padding:3px 8px;border-radius:3px;font-size:11px;color:#888}
.preview-pane{display:none;background:#15152a;border-radius:6px;padding:16px;margin-top:10px;white-space:pre-wrap;font-size:12px;line-height:1.5;max-height:350px;overflow-y:auto;color:#ccc}
.field-group{margin-bottom:12px;padding:12px 16px;background:#15152a;border-radius:6px}
.field-group label{font-size:13px;font-weight:600;display:block;margin-bottom:2px}
.field-group .explain{font-size:11px;color:#888;line-height:1.4;margin-bottom:6px}
.field-group input,.field-group select,.field-group textarea,.field-group input[type=file]{width:100%;padding:8px 10px;background:#0f0f0f;border:1px solid #333;border-radius:4px;color:#fff;font-size:13px}
.form-card{cursor:pointer}.form-card:hover{border-color:#d63b1e}
.preview-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto}
.preview-content{background:#1a1a2e;max-width:700px;margin:40px auto;border-radius:12px;padding:32px;position:relative}
.preview-content .close{position:absolute;top:16px;right:20px;background:none;border:none;color:#888;font-size:28px;cursor:pointer}
.preview-content .close:hover{color:#fff}
.auth-page{max-width:400px;margin:60px auto;text-align:center}
.auth-page h1{font-size:24px;margin-bottom:20px}
.auth-page .field-group{text-align:left}
.auth-page .switch{color:#888;font-size:13px;margin-top:16px}
.auth-page .switch a{color:#d63b1e;cursor:pointer}
.error-msg{color:#c00;font-size:13px;margin:8px 0}
.success-msg{color:#4caf50;font-size:13px;margin:8px 0}
#loading{text-align:center;padding:60px;color:#555}
</style>
</head>
<body>
<div id="app"></div>

<script>
const API = '/api';
let TOKEN = localStorage.getItem('lw_token');
let AGENT = null;

// ── Auth ──
async function authFetch(url, opts = {}) {
  const headers = opts.headers || {};
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API + url, { ...opts, headers });
  if (res.status === 401) { TOKEN = null; localStorage.removeItem('lw_token'); render(); }
  return res;
}

async function checkAuth() {
  if (!TOKEN) return false;
  try {
    const res = await authFetch('/auth/me');
    if (!res.ok) { TOKEN = null; localStorage.removeItem('lw_token'); return false; }
    const data = await res.json();
    AGENT = data.agent;
    return true;
  } catch { return false; }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('auth-err');
  try {
    const res = await fetch(API + '/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,pw}) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail || 'Login failed'; return; }
    TOKEN = data.token; localStorage.setItem('lw_token', TOKEN);
    AGENT = data.agent;
    err.textContent = '';
    render();
  } catch(e) { err.textContent = e.message; }
}

async function handleSignup(e) {
  e.preventDefault();
  const email = document.getElementById('signup-email').value;
  const pw = document.getElementById('signup-pw').value;
  const name = document.getElementById('signup-name').value;
  const brokerage = document.getElementById('signup-brokerage').value;
  const err = document.getElementById('auth-err');
  try {
    const res = await fetch(API + '/auth/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,pw,name,brokerage}) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail || 'Signup failed'; return; }
    TOKEN = data.token; localStorage.setItem('lw_token', TOKEN);
    AGENT = data.agent;
    err.textContent = '';
    render();
  } catch(e) { err.textContent = e.message; }
}

function logout() { TOKEN = null; localStorage.removeItem('lw_token'); AGENT = null; render(); }

// ── Render ──
function render() {
  if (!TOKEN) { renderAuth(); return; }
  renderDashboard();
}

function renderAuth() {
  const isLogin = localStorage.getItem('lw_auth_mode') !== 'signup';
  document.getElementById('app').innerHTML = `
    <div class="auth-page">
      <h1>🔑 Agent Dashboard</h1>
      <div id="auth-err" class="error-msg"></div>
      ${isLogin ? `
        <form onsubmit="handleLogin(event)">
          <div class="field-group"><label>Email</label><input id="login-email" type="email" required></div>
          <div class="field-group"><label>Password</label><input id="login-pw" type="password" required></div>
          <button class="btn" style="width:100%;justify-content:center;margin-top:8px">Log In</button>
        </form>
        <div class="switch">Don't have an account? <a onclick="localStorage.setItem('lw_auth_mode','signup');render()">Sign up</a></div>
      ` : `
        <form onsubmit="handleSignup(event)">
          <div class="field-group"><label>Name</label><input id="signup-name" required></div>
          <div class="field-group"><label>Email</label><input id="signup-email" type="email" required></div>
          <div class="field-group"><label>Password</label><input id="signup-pw" type="password" required></div>
          <div class="field-group"><label>Brokerage</label><input id="signup-brokerage"></div>
          <button class="btn" style="width:100%;justify-content:center;margin-top:8px">Create Account</button>
        </form>
        <div class="switch">Already have an account? <a onclick="localStorage.setItem('lw_auth_mode','login');render()">Log in</a></div>
      `}
    </div>`;
}

function renderDashboard() {
  document.getElementById('app').innerHTML = `
    <div class="nav">
      <span class="brand">ListWorks PRO</span>
      <a href="#" class="active" onclick="showPage('packs')">Content</a>
      <a href="#" onclick="showPage('forms')">Contracts</a>
      <a href="#" onclick="showPage('generate')">Generate</a>
      <a href="#" onclick="showPage('branding')">Branding</a>
      <span class="spacer"></span>
      <span class="user" onclick="logout()">${AGENT?.name || 'Agent'} ⏻</span>
    </div>
    <div class="container">
      <div id="page-packs" class="page active"></div>
      <div id="page-forms" class="page"></div>
      <div id="page-generate" class="page"></div>
      <div id="page-branding" class="page"></div>
    </div>`;
  showPage('packs');
  loadPacks();
  loadForms();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  if (name === 'branding') renderBranding();
}

// ── Content Packs ──
async function loadPacks() {
  const el = document.getElementById('page-packs');
  el.innerHTML = '<div id="loading">Loading content packs...</div>';
  try {
    const res = await authFetch('/content/packs');
    const data = await res.json();
    if (!data.packs?.length) {
      el.innerHTML = `<h1>📦 Content Packs</h1><p class="sub">Auto-generated for every lead you send</p><div class="empty-state" style="text-align:center;padding:60px"><h2 style="color:#555;font-size:18px">No packs yet</h2><p style="color:#444;font-size:13px">They appear here automatically. Or generate one now.</p><div style="margin-top:16px"><button class="btn" onclick="showPage('generate')">⚡ Generate</button></div></div>`;
      return;
    }
    let html = `<h1>📦 Content Packs</h1><p class="sub">${data.packs.length} packs — auto-generated for every lead</p>`;
    for (const p of data.packs) {
      const files = ['reel-script.txt','instagram-caption.txt','carousel.txt','weekly-calendar.md','market-report-post.txt','canva-templates.json'];
      html += `<div class="card"><h2>${p.name || 'Lead #'+p.leadId}</h2>
        <div class="meta">${p.city || ''} · ${p.generatedAt ? new Date(p.generatedAt).toLocaleDateString() : ''}</div>
        <div class="pack-files">${files.map(f => `<span class="file-tag">${f}</span>`).join('')}</div>
        <div class="btn-group">
          <button class="btn" onclick="previewPack(${p.leadId},'reel-script.txt','🎬 Reel')">🎬 Reel</button>
          <button class="btn btn-outline" onclick="previewPack(${p.leadId},'instagram-caption.txt','📸 IG')">📸 IG</button>
          <button class="btn btn-outline" onclick="previewPack(${p.leadId},'weekly-calendar.md','📅 Calendar')">📅 Calendar</button>
          <button class="btn btn-outline" onclick="previewPack(${p.leadId},'market-report-post.txt','📊 Market')">📊 Market</button>
          <button class="btn btn-outline" onclick="previewPack(${p.leadId},'canva-templates.json','🎨 Canva')">🎨 Canva</button>
        </div>
        <div class="preview-pane" id="preview-${p.leadId}"></div></div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<h1>📦 Content Packs</h1><p class="sub" style="color:#c00">Error loading packs</p>`;
  }
}

async function previewPack(id, file, label) {
  const el = document.getElementById('preview-' + id);
  if (!el) return;
  if (el.style.display === 'block' && el.dataset.file === file) { el.style.display = 'none'; return; }
  el.style.display = 'block'; el.textContent = 'Loading...'; el.dataset.file = file;
  try {
    const res = await authFetch(`/content/${id}/${file}`);
    if (!res.ok) throw Error('Not found');
    const text = await res.text();
    if (file === 'canva-templates.json') {
      try {
        const data = JSON.parse(text); const links = [];
        const walk = (obj, p='') => { for(const[k,v] of Object.entries(obj)) { if(typeof v === 'string' && v.startsWith('http')) links.push(`<a href="${v}" target="_blank" style="display:block;padding:3px 0;color:#d63b1e">🎨 ${p}${k}</a>`); else if(typeof v === 'object') walk(v, p+k+' › '); } };
        walk(data); el.innerHTML = `<strong style="display:block;margin-bottom:8px;font-size:13px">${label}</strong>${links.join('')}`; return;
      } catch(e) {}
    }
    el.innerHTML = `<strong style="display:block;margin-bottom:8px;font-size:13px">${label}</strong>${text}`;
  } catch(e) { el.textContent = 'Could not load'; }
}

// ── Forms ──
async function loadForms() {
  const el = document.getElementById('page-forms');
  el.innerHTML = '<div id="loading">Loading forms...</div>';
  try {
    const res = await authFetch('/forms'); const data = await res.json();
    if (!data.forms?.length) { el.innerHTML = `<h1>📄 Contracts</h1><p class="sub">No forms available</p>`; return; }
    let html = `<h1>📄 Contracts & Forms</h1><p class="sub">Fillable forms with field-by-field explanations + branded PDF download</p>`;
    for (const f of data.forms) {
      const fields = f.sections.reduce((a,s) => a + s.fields.length, 0);
      html += `<div class="card form-card" onclick="openForm('${f.id}')"><h2>${f.name}</h2><div class="meta">${fields} fields · <span class="file-tag">${f.category}</span></div><p>${f.description}</p></div>`;
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<h1>📄 Contracts</h1><p class="sub">Error loading forms</p>`; }
}

async function openForm(formId) {
  document.getElementById('form-overlay')?.remove();
  const overlay = document.createElement('div'); overlay.className = 'preview-overlay'; overlay.id = 'form-overlay'; overlay.onclick = function(e) { if(e.target===this) this.remove(); };
  overlay.innerHTML = `<div class="preview-content" id="form-content"><div id="loading">Loading...</div></div>`;
  document.body.appendChild(overlay);
  overlay.style.display = 'block';
  const content = document.getElementById('form-content');
  try {
    const res = await fetch(API + '/forms/' + formId); const form = await res.json();
    const brand = AGENT?.branding || {};
    const p = brand.primary_color || '#1a1a2e'; const s = brand.secondary_color || '#d63b1e';
    let html = `<h2 style="margin:0 0 4px;color:#fff">${form.name}</h2><p style="color:#888;font-size:13px;margin-bottom:20px">${form.description}</p>
      <form id="form-fields" onsubmit="downloadPDF(event,'${formId}')">`;
    for (const section of form.sections) {
      html += `<h3 style="color:${s};font-size:13px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #2a2a4a">${section.title}</h3>`;
      for (const field of section.fields) {
        const req = field.required ? ' <span style="color:#c00">*</span>' : '';
        html += `<div class="field-group"><label>${field.label}${req}</label><div class="explain">${field.explanation || ''}</div>`;
        if (field.type === 'textarea') html += `<textarea name="${field.id}" placeholder="${field.label}"></textarea>`;
        else if (field.type === 'select') html += `<select name="${field.id}">${field.options.map(o => `<option>${o}</option>`).join('')}</select>`;
        else if (field.type === 'checkbox') html += `<input type="checkbox" name="${field.id}" value="yes"> Yes`;
        else html += `<input type="${field.type === 'currency' ? 'text' : field.type}" name="${field.id}" placeholder="${field.label}">`;
        html += `</div>`;
      }
    }
    html += `<div style="text-align:center;margin-top:20px"><button type="submit" class="btn">📄 Download Branded PDF</button></div></form>`;
    content.innerHTML = html;
  } catch(e) { content.innerHTML = `<p style="color:#c00">${e.message}</p>`; }
}

window.downloadPDF = async function(event, formId) {
  event.preventDefault();
  const form = document.getElementById('form-fields'); const data = new FormData(form); const values = {};
  for (const [k,v] of data.entries()) values[k] = v;
  const brand = AGENT?.branding || {};
  try {
    const res = await authFetch('/forms/' + formId + '/pdf', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values, brand}) });
    const blob = await res.blob(); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = formId + '.pdf'; a.click(); URL.revokeObjectURL(url);
  } catch(e) { alert('Error: ' + e.message); }
};

// ── Generate ──
async function generateContent() {
  const city = document.getElementById('gen-city')?.value || 'Denver';
  const price = document.getElementById('gen-price')?.value || '$575,000';
  const features = document.getElementById('gen-features')?.value || 'updated kitchen, natural light, fenced yard';
  const result = document.getElementById('gen-result');
  result.innerHTML = '<p style="color:#888">Generating...</p>';
  try {
    const res = await authFetch('/content/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({first_name:'Test',city,price,features}) });
    const data = await res.json();
    const reel = data.social?.reelScript?.substring(0,200) || 'Generated!';
    result.innerHTML = `<div class="card" style="margin-top:12px"><h2 style="color:#4caf50">✅ Generated</h2><div class="meta">Check Content tab for all files</div><div style="background:#0f0f0f;padding:12px;border-radius:6px;font-size:12px;color:#aaa;white-space:pre-wrap">${reel}</div></div>`;
    loadPacks();
  } catch(e) { result.innerHTML = `<p style="color:#c00">${e.message}</p>`; }
}

// ── Branding ──
function renderBranding() {
  const b = AGENT?.branding || {};
  document.getElementById('page-branding').innerHTML = `
    <h1>🎨 Your Branding</h1>
    <p class="sub">This appears on every contract PDF you download and all generated content</p>
    <div class="card">
      <div class="field-group"><label>Your Name</label><input id="br-name" value="${AGENT?.name || ''}"></div>
      <div class="field-group"><label>Brokerage</label><input id="br-brokerage" value="${AGENT?.brokerage || ''}"></div>
      <div class="field-group"><label>Logo URL</label><input id="br-logo" value="${b.logo_url || ''}" placeholder="https://yourlogo.com/logo.png"></div>
      <div class="field-group"><label>Primary Color</label><input id="br-primary" value="${b.primary_color || '#1a1a2e'}" placeholder="#1a1a2e"></div>
      <div class="field-group"><label>Accent Color</label><input id="br-secondary" value="${b.secondary_color || '#d63b1e'}" placeholder="#d63b1e"></div>
      <button class="btn" onclick="saveBranding()">💾 Save Branding</button>
      <div id="br-msg" style="margin-top:8px"></div>
    </div>`;
}

async function saveBranding() {
  const body = {
    agent_name: document.getElementById('br-name').value,
    brokerage: document.getElementById('br-brokerage').value,
    logo_url: document.getElementById('br-logo').value,
    primary_color: document.getElementById('br-primary').value,
    secondary_color: document.getElementById('br-secondary').value,
  };
  const msg = document.getElementById('br-msg');
  try {
    const res = await authFetch('/auth/branding', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!res.ok) throw Error('Failed');
    msg.innerHTML = '<p class="success-msg">✅ Branding saved. It will appear on your next PDF download.</p>';
    AGENT.branding = body;
  } catch(e) { msg.innerHTML = `<p class="error-msg">${e.message}</p>`; }
}

// ── Init ──
(async () => {
  const authed = await checkAuth();
  render();
  if (authed) {
    document.getElementById('page-generate') && (document.getElementById('page-generate').innerHTML = `
      <h1>⚡ Generate Content</h1>
      <p class="sub">Input a listing → get everything: copy, social, Canva links, market report</p>
      <div class="card" style="padding:24px">
        <div class="field-group"><label>City</label><input id="gen-city" placeholder="Denver"></div>
        <div class="field-group"><label>Price</label><input id="gen-price" placeholder="$575,000"></div>
        <div class="field-group"><label>Features (comma separated)</label><input id="gen-features" placeholder="updated kitchen, natural light, fenced yard"></div>
        <button class="btn" onclick="generateContent()">🚀 Generate Full Pack</button>
        <div id="gen-result" style="margin-top:16px"></div>
      </div>`);
  }
})();
</script>
</body>
</html>
