<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing Presentation Preview — 50 Pages</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Main viewer */
.viewer {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
    padding: 20px;
    position: relative;
}

.viewer img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    display: block;
}

/* Arrows */
.arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 10;
}
.arrow:hover { background: #c5a880; border-color: #c5a880; }
.arrow-left { left: 16px; }
.arrow-right { right: 16px; }

/* Bottom bar */
.bottom-bar {
    width: 100%;
    max-width: 1100px;
    padding: 12px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
}

.counter {
    font-size: 13px;
    color: #888;
    letter-spacing: 1px;
}
.counter span { color: #c5a880; font-weight: 600; }

/* Thumbnails row */
.thumbs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0;
    max-width: 100%;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
}
.thumbs img {
    width: 60px;
    height: 40px;
    object-fit: cover;
    border-radius: 3px;
    cursor: pointer;
    opacity: 0.5;
    border: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
}
.thumbs img:hover { opacity: 0.8; }
.thumbs img.active { opacity: 1; border-color: #c5a880; }

@media (max-width: 600px) {
    .viewer { padding: 10px; }
    .arrow { width: 36px; height: 36px; font-size: 16px; }
    .thumbs img { width: 40px; height: 28px; }
}
</style>
</head>
<body>

<div class="viewer">
    <button class="arrow arrow-left" onclick="prev()">‹</button>
    <img id="mainImg" src="" alt="Slide">
    <button class="arrow arrow-right" onclick="next()">›</button>
</div>

<div class="bottom-bar">
    <div class="counter">Page <span id="pageNum">1</span> of <span id="pageTotal">50</span></div>
    <div class="thumbs" id="thumbRow"></div>
</div>

<script>
const total = 50;
let current = 0;

function show(n) {
    current = n;
    document.getElementById('mainImg').src = `/presentation-previews/slide_${String(n+1).padStart(2,'0')}.png`;
    document.getElementById('pageNum').textContent = n + 1;
    
    document.querySelectorAll('.thumbs img').forEach((img, i) => {
        img.classList.toggle('active', i === n);
        if (i === n) img.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
}

function next() { if (current < total - 1) show(current + 1); }
function prev() { if (current > 0) show(current - 1); }

// Build thumbnails
const thumbRow = document.getElementById('thumbRow');
for (let i = 0; i < total; i++) {
    const img = document.createElement('img');
    img.src = `/presentation-previews/slide_${String(i+1).padStart(2,'0')}.png`;
    img.alt = `Slide ${i+1}`;
    img.onclick = () => show(i);
    thumbRow.appendChild(img);
}

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
});

show(0);
</script>
</body>
</html>
